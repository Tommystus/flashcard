<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katakana Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&display=swap');

        .kanji-text { font-family: 'Noto Sans JP', serif; }
        .kana-text { font-family: 'Noto Sans JP', sans-serif; }
        
        .fade-transition {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 kana-text">

    <div class="w-full max-w-lg">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-green-600 mb-2">Katakana Mastery</h1>
            
            <div class="flex items-center justify-center gap-2 mb-4">
                <label for="startPhase" class="text-xs font-bold text-gray-400 uppercase tracking-wider">Start with:</label>
                <select id="startPhase" class="bg-white border border-gray-300 text-gray-700 text-sm rounded-lg px-2 py-1 focus:ring-green-500 focus:border-green-500 outline-none">
                    <option value="0">Katakana</option>
                    <option value="1">Definition</option>
                    <option value="2">Reading</option>
                </select>
            </div>

            <div id="progress" class="text-sm font-semibold text-gray-500">Loading...</div>
            
            <div class="flex justify-center gap-2 mt-2">
                <div id="dot-0" class="h-2 w-8 rounded-full bg-green-500 transition-all"></div>
                <div id="dot-1" class="h-2 w-8 rounded-full bg-gray-300 transition-all"></div>
                <div id="dot-2" class="h-2 w-8 rounded-full bg-gray-300 transition-all"></div>
            </div>
        </header>

        <div id="flashcard" class="relative w-full aspect-[3/2] cursor-pointer group">
            <div id="card-body" class="w-full h-full shadow-xl rounded-2xl bg-white border-2 border-green-500 flex flex-col items-center justify-center p-6 text-center transition-all duration-300 transform active:scale-95">
                
                <div id="card-content" class="fade-transition flex flex-col items-center">
                    </div>

                <div class="absolute bottom-4 text-gray-300 text-xs uppercase tracking-widest font-bold">
                    Tap to reveal next
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mt-10 gap-4">
            <button id="prevBtn" class="flex-1 bg-white border border-gray-300 py-3 rounded-xl font-bold hover:bg-gray-50 active:scale-95 transition">Prev</button>
            <button id="shuffleBtn" title="Shuffle Deck" class="bg-blue-500 p-3 rounded-xl hover:bg-blue-600 transition text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
            </button>
            <button id="nextBtn" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 active:scale-95 transition">Next</button>
        </div>
        
        <div class="mt-8 p-4 bg-white rounded-lg border border-gray-200 shadow-sm text-center">
            <p class="text-gray-400 text-xs uppercase tracking-widest font-bold">Shortcuts</p>
            <p class="text-gray-500 text-sm mt-1">Space/Tap: Cycle | Arrows: Change Card</p>
        </div>
    </div>

    <script>
        const vocabulary = [
            { kanji: "ノンフィクション", hiragana: "", romaji: "nonfikushon", definition: "non-fiction", example: "ノンフィクションはありますか" },
            { kanji: "コーヒー", hiragana: "", romaji: "kōhī", definition: "Coffee", example: "コーヒーは安いです" },
            { kanji: "コメディ", hiragana: "", romaji: "comedi", definition: "comedy", example: "毎日 コメディ を見ます" },
            { kanji: "パズル", hiragana: "", romaji: "pazuru", definition: "puzzle", example: "よく家族とパズルをします" },
            { kanji: "ホラー", hiragana: "", romaji: "Horā", definition: "horror", example: "ホラー映画は見ません" },
            { kanji: "コーナー", hiragana: "", romaji: "kōnā", definition: "corner", example: "DVD のコーナーはあそこです" },
            { kanji: "セール", hiragana: "", romaji: "sēru", definition: "sales", example: "漫画のセールはいつですか" },
            { kanji: "ドキュメンタリー", hiragana: "", romaji: "dokyumentarī", definition: "documentary", example: "そのドキュメンタリーはとても面白いです" },
            { kanji: "ポスター", hiragana: "", romaji: "posutā", definition: "poster", example: "アニメのポスターが欲しいです" },
            { kanji: "カードゲーム", hiragana: "", romaji: "Kādogēmu", definition: "card games", example: "カードゲームはあまりしません" },
            { kanji: "ちょっと", hiragana: "", romaji: "chotto", definition: "a little", example: "ちょっと難しいです" },
            { kanji: "パスポート", hiragana: "", romaji: "Pasupōto", definition: "passport", example: "パスポートをお願いします" },
            { kanji: "ゴミ箱", hiragana: "ゴミばこ", romaji: "gomibako", definition: "trash can", example: "ゴミ箱はありますか" },
            { kanji: "ゆっくり", hiragana: "ゆっくり", romaji: "yukkuri", definition: "slow, relax", example: "そこで ゆっくりしますか" },
            { kanji: "ネット", hiragana: "", romaji: "netto", definition: "internet", example: "ネットで部屋を予約します" }
        ];

        let currentIndex = 0;
        let currentPhase = 0;
        let startPhasePreference = 0;

        const cardBody = document.getElementById('card-body');
        const cardContent = document.getElementById('card-content');
        const progressEl = document.getElementById('progress');
        const startPhaseSelector = document.getElementById('startPhase');

        function speakText(text, event) {
            if (event) event.stopPropagation();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                
                // Try to use a Japanese voice if loaded
                const voices = window.speechSynthesis.getVoices();
                const jaVoice = voices.find(v => v.lang.startsWith('ja'));
                if (jaVoice) utterance.voice = jaVoice;
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Speech synthesis not supported in this browser.");
            }
        }

        function translateText(text, event) {
            if (event) event.stopPropagation();
            const url = `https://translate.google.com/?sl=ja&tl=en&text=${encodeURIComponent(text)}&op=translate`;
            window.open(url, '_blank');
        }
        
        function updateDisplay() {
            const word = vocabulary[currentIndex];
            cardContent.classList.add('opacity-0');
            
            setTimeout(() => {
                // Update dots
                [0, 1, 2].forEach(i => {
                    const dot = document.getElementById(`dot-${i}`);
                    dot.className = i === currentPhase ? "h-2 w-8 rounded-full bg-green-500 transition-all" : "h-2 w-8 rounded-full bg-gray-300 transition-all";
                });

                // Phase Logic
                if (currentPhase === 0) {
					// Check text length and set font size accordingly
					const fontSize = word.kanji.length > 7 ? 'text-5xl' : 'text-7xl';
					cardBody.className = "w-full h-full shadow-xl rounded-3xl bg-white border-2 border-green-500 flex flex-col items-center justify-center p-6 text-center transition-all duration-300 transform active:scale-95";
					cardContent.innerHTML = `
                        <div class="flex items-center justify-center gap-3">
                            <span class="kanji-text ${fontSize} font-bold text-gray-800">${word.kanji}</span>
                            <div class="flex flex-col gap-1.5">
                                <button onclick="speakText('${word.kanji}', event)" class="p-2 rounded-full bg-gray-50 hover:bg-green-100 text-gray-500 hover:text-green-600 transition shadow-sm" title="Speak Word">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                                    </svg>
                                </button>
                                <button onclick="translateText('${word.kanji}', event)" class="p-2 rounded-full bg-gray-50 hover:bg-blue-100 text-gray-500 hover:text-blue-600 transition shadow-sm" title="Translate Word">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 11.37 7.363 16.5 3 18.785M12 9.355a17.897 17.897 0 01-2.207 4.145"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        ${word.example ? `
                        <div class="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-xl flex items-center justify-between gap-4 max-w-sm">
                            <span class="text-base text-blue-800 font-medium leading-snug text-left">${word.example}</span>
                            <div class="flex gap-1.5 flex-shrink-0">
                                <button onclick="speakText('${word.example}', event)" class="p-1.5 rounded-lg bg-white hover:bg-blue-100 text-blue-500 hover:text-blue-700 transition shadow-sm" title="Speak Example">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                                    </svg>
                                </button>
                                <button onclick="translateText('${word.example}', event)" class="p-1.5 rounded-lg bg-white hover:bg-blue-100 text-blue-500 hover:text-blue-700 transition shadow-sm" title="Translate Example">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 11.37 7.363 16.5 3 18.785M12 9.355a17.897 17.897 0 01-2.207 4.145"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        ` : ''}
					`;
                } 
                else if (currentPhase === 1) {
                    cardBody.className = "w-full h-full shadow-xl rounded-2xl bg-green-50 border-2 border-green-600 flex flex-col items-center justify-center p-6 text-center transition-all duration-300 transform active:scale-95";
                    cardContent.innerHTML = `
                        <span class="text-sm text-green-600 uppercase font-bold mb-2 tracking-widest">Meaning</span>
                        <span class="text-4xl font-medium text-gray-800 leading-tight">${word.definition}</span>
                    `;
                } 
                else {
                    cardBody.className = "w-full h-full shadow-xl rounded-2xl bg-blue-50 border-2 border-blue-400 flex flex-col items-center justify-center p-6 text-center transition-all duration-300 transform active:scale-95";
                    cardContent.innerHTML = `
                        ${word.hiragana ? `<span class="text-xl text-blue-600 italic mb-1">${word.hiragana}</span>` : ''}
                            <span class="text-5xl font-bold text-blue-800">${word.romaji}</span>
                    `;
                }

                progressEl.textContent = `Card ${currentIndex + 1} / ${vocabulary.length}`;
                cardContent.classList.remove('opacity-0');
            }, 100);
        }

        function cyclePhase() {
			if ((startPhasePreference === 2) || (startPhasePreference === 0)) {
            	currentPhase = (currentPhase + 2) % 3;
			} else {
            	currentPhase = (currentPhase + 1) % 3;
			}
            updateDisplay();
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % vocabulary.length;
            currentPhase = startPhasePreference; // Reset to preferred start state
            updateDisplay();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
            currentPhase = startPhasePreference; // Reset to preferred start state
            updateDisplay();
        }

        function shuffle() {
            for (let i = vocabulary.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocabulary[i], vocabulary[j]] = [vocabulary[j], vocabulary[i]];
            }
            currentIndex = 0;
            currentPhase = startPhasePreference;
            updateDisplay();
        }

        // Event Listeners
        startPhaseSelector.addEventListener('change', (e) => {
            startPhasePreference = parseInt(e.target.value);
            currentPhase = startPhasePreference; // Update current card immediately
            updateDisplay();
        });

        document.getElementById('flashcard').addEventListener('click', cyclePhase);
        document.getElementById('nextBtn').addEventListener('click', nextCard);
        document.getElementById('prevBtn').addEventListener('click', prevCard);
        document.getElementById('shuffleBtn').addEventListener('click', shuffle);

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                cyclePhase();
            }
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
        });

        window.onload = shuffle;
    </script>
</body>
</html>
